<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Crear cliente</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">new-client</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="container mt-4">

    <a routerLink="/clients" class="btn btn-primary mb-3"> Volver a CLIENTES </a>

    <h1>Nuevo Cliente</h1>

    <input
      class="form-control mb-2"
      [(ngModel)]="client.name"
      placeholder="Nombre"
    />
    <input
      type="email"
      class="form-control mb-2"
      [(ngModel)]="client.email"
      placeholder="Email"
      #email="ngModel"
      required
    />
    <input
      class="form-control mb-2"
      [(ngModel)]="client.phone"
      placeholder="Teléfono"
    />

    <button class="btn btn-success" (click)="save()">Guardar</button>

  </div>
</ion-content>
