<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">login</ion-title>
    </ion-toolbar>
  </ion-header>
  <br>
  
  <a routerLink="/clients" class="btn btn-primary mb-3"> Volver a CLIENTES </a>

  <h1>Login</h1>

    <input
      class="form-control mb-2"
      [(ngModel)]="email"
      placeholder="Ingrese correo electronico"
    />
    <input
      class="form-control mb-2"
      [(ngModel)]="password"
      placeholder="Contraseña"
    />

    <button class="btn btn-success" (click)="comprobar()">Iniciar sesion</button>

</ion-content>
